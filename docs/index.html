<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWA Job Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0c1220;
    --surface:  #141d2e;
    --border:   #1f2d44;
    --text:     #e8edf5;
    --muted:    #6b7f99;
    --accent:   #4f9cf9;
    --green:    #22d3a0;
    --teal:     #2dd4bf;
    --pill-bg:  #1a2740;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .site-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -.5px; line-height: 1.1; }
  .site-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .08em; }
  .meta-pill { font-size: 11px; padding: 4px 10px; border-radius: 999px; background: var(--pill-bg); color: var(--muted); border: 1px solid var(--border); white-space: nowrap; }
  .meta-pill span { color: var(--accent); font-weight: 600; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab-btn {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--pill-bg); color: var(--muted); cursor: pointer; transition: all .15s; text-align: center;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab-btn.active.green { background: var(--teal); border-color: var(--teal); }

  .filter-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--pill-bg); color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .search-wrap { padding: 12px 16px 0; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 9px 14px; border-radius: 8px; outline: none; transition: border-color .15s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .stats-bar { display: flex; gap: 20px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .stats-bar strong { color: var(--text); }

  .job-list { padding: 12px 16px 32px; display: flex; flex-direction: column; gap: 10px; }

  .job-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; text-decoration: none; display: block;
    transition: border-color .15s, transform .1s; position: relative;
  }
  .job-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .job-card.community:hover { border-color: var(--teal); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .job-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 15px; color: var(--text); line-height: 1.3; flex: 1; }
  .new-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; background: var(--green); color: #052e1c; padding: 2px 7px; border-radius: 999px; flex-shrink: 0; margin-top: 2px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .badge-district { background: rgba(79,156,249,.12); color: var(--accent); border: 1px solid rgba(79,156,249,.25); }
  .badge-district.community { background: rgba(45,212,191,.1); color: var(--teal); border: 1px solid rgba(45,212,191,.2); }
  .badge-match { background: rgba(34,211,160,.1); color: var(--green); border: 1px solid rgba(34,211,160,.2); }
  .badge-platform { background: var(--pill-bg); color: var(--muted); border: 1px solid var(--border); }
  .card-detail { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .card-arrow { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; opacity: .4; }

  .section-header {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
    padding: 16px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-header .count { color: var(--accent); }
  .section-header.community .count { color: var(--teal); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { color: var(--text); font-family: 'Syne', sans-serif; margin-bottom: 6px; }
  .last-updated { font-size: 11px; color: var(--muted); text-align: center; padding: 0 16px 24px; }

  @media (min-width: 600px) {
    .header, .search-wrap, .stats-bar { padding-left: 24px; padding-right: 24px; }
    .job-list { padding: 14px 24px 40px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="site-title">NWA Job Tracker</div>
      <div class="site-subtitle">22 sources · filtered for your skillset</div>
    </div>
    <div class="meta-pill" id="total-pill">loading…</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active"        id="tab-all"      onclick="setTab('all')">All</button>
    <button class="tab-btn"               id="tab-school"   onclick="setTab('school')">🏫 Schools</button>
    <button class="tab-btn green"         id="tab-community" onclick="setTab('community')">🏛️ Community</button>
  </div>
  <div class="filter-scroll" id="filter-bar">
    <button class="filter-btn active" data-source="all" onclick="setSource('all')">All Sources</button>
  </div>
</div>

<div class="search-wrap">
  <input class="search-input" id="search" type="search" placeholder="Search jobs, districts, skills…" autocomplete="off">
</div>

<div class="stats-bar" id="stats-bar"><span>Loading…</span></div>
<div class="job-list" id="job-list"><div style="text-align:center;padding:60px;color:var(--muted);">Fetching jobs…</div></div>
<div class="last-updated" id="last-updated"></div>

<script>
const SHORT = {
  "Bentonville SD":"BPS","Farmington SD":"FSD","Elkins SD":"ESD","Greenland SD":"GRN",
  "Decatur SD":"DEC","Gravette SD":"GVT","Gentry SD":"GNT","District SD":"DST",
  "Huntsville SD":"HSD","Pea Ridge SD":"PRS","Prairie Grove SD":"PGS",
  "Rogers SD":"RSD","Siloam Springs SD":"SSS","Lincoln Consolidated SD":"LIN",
  "Springdale SD":"SPD","West Fork SD":"WFS",
  "Rogers (City)":"Rogers","Bentonville (City)":"BV City",
  "Springdale Public Library":"SPD Lib","University of Arkansas":"UAF",
  "NWACC":"NWACC","City of Bella Vista":"BV City",
};

let allJobs = [], activeTab = "all", activeSource = "all", searchQuery = "";
const today = new Date().toISOString().split("T")[0];

async function loadJobs() {
  try {
    const r    = await fetch("jobs.json?t=" + Date.now());
    const data = await r.json();
    allJobs    = data.jobs || [];
    buildFilters();
    renderAll();
    document.getElementById("last-updated").textContent =
      data.last_updated
        ? "Last updated: " + new Date(data.last_updated).toLocaleString()
        : "Run the scraper to populate this dashboard.";
  } catch(e) {
    document.getElementById("job-list").innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><h3>Couldn't load jobs.json</h3>
       <p>Make sure index.html is inside the docs/ folder<br>alongside jobs.json.</p></div>`;
  }
}

function buildFilters() {
  const bar = document.getElementById("filter-bar");
  bar.querySelectorAll("[data-source]:not([data-source='all'])").forEach(el => el.remove());
  const sources = [...new Set(allJobs.map(j => j.district))].sort();
  sources.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.dataset.source = s;
    btn.textContent = SHORT[s] || s;
    btn.title = s;
    btn.onclick = () => setSource(s);
    bar.appendChild(btn);
  });
}

function setTab(tab) {
  activeTab = tab; activeSource = "all";
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.source === "all"));
  renderAll();
}

function setSource(source) {
  activeSource = source;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.source === source));
  renderAll();
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase(); renderAll();
});

function filtered() {
  return allJobs.filter(j => {
    const cat = j.category || "school";
    if (activeTab !== "all" && cat !== activeTab) return false;
    if (activeSource !== "all" && j.district !== activeSource) return false;
    if (searchQuery && ![j.title, j.district, j.location||"", j.match_reason||""].some(s => s.toLowerCase().includes(searchQuery))) return false;
    return true;
  });
}

function renderAll() {
  const jobs    = filtered();
  const newOnes = jobs.filter(j => j.first_seen === today);
  document.getElementById("total-pill").innerHTML = `<span>${allJobs.length}</span> matches`;
  document.getElementById("stats-bar").innerHTML  =
    `<span><strong>${jobs.length}</strong> showing</span>
     <span><strong>${newOnes.length}</strong> new today</span>
     <span><strong>${allJobs.length}</strong> total</span>`;

  if (!jobs.length) {
    document.getElementById("job-list").innerHTML =
      `<div class="empty"><div class="empty-icon">🔍</div>
       <h3>${allJobs.length ? "No matches" : "No jobs yet"}</h3>
       <p>${allJobs.length ? "Clear your filter or search." : "Run the scraper first."}</p></div>`;
    return;
  }

  const sorted = [...jobs].sort((a,b) => {
    const aN = a.first_seen === today ? 0 : 1;
    const bN = b.first_seen === today ? 0 : 1;
    if (aN !== bN) return aN - bN;
    return (a.category||"school").localeCompare(b.category||"school") || a.district.localeCompare(b.district);
  });

  // Split into sections when showing "All" tab
  let html = "";
  if (activeTab === "all") {
    const school = sorted.filter(j => (j.category||"school") === "school");
    const comm   = sorted.filter(j => j.category === "community");
    if (school.length) {
      html += `<div class="section-header"><span>🏫 School Districts</span><span class="count">${school.length}</span></div>`;
      html += school.map(cardHTML).join("");
    }
    if (comm.length) {
      html += `<div class="section-header community"><span>🏛️ Libraries, Universities & City</span><span class="count" style="color:var(--teal)">${comm.length}</span></div>`;
      html += comm.map(cardHTML).join("");
    }
  } else {
    html = sorted.map(cardHTML).join("");
  }

  document.getElementById("job-list").innerHTML = html;
}

function cardHTML(j) {
  const isNew = j.first_seen === today;
  const isCom = j.category === "community";
  const det   = [j.location, j.posted_date ? "Posted " + j.posted_date : ""].filter(Boolean).join(" · ");
  return `
  <a class="job-card${isCom ? " community" : ""}" href="${esc(j.url)}" target="_blank" rel="noopener">
    <div class="card-top">
      <div class="job-title">${esc(j.title)}</div>
      ${isNew ? '<span class="new-badge">New</span>' : ""}
    </div>
    <div class="card-meta">
      <span class="badge badge-district${isCom ? " community" : ""}">${esc(SHORT[j.district]||j.district)}</span>
      ${j.match_reason && j.match_reason !== "no_match" ? `<span class="badge badge-match">${esc(j.match_reason)}</span>` : ""}
      <span class="badge badge-platform">${esc(j.platform)}</span>
    </div>
    ${det ? `<div class="card-detail">${esc(det)}</div>` : ""}
    <span class="card-arrow">›</span>
  </a>`;
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

loadJobs();
</script>
</body>
</html>
