name: Daily Job Scraper

on:
  schedule:
    # 8:00 AM CDT (UTC-5) = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:   # lets you run it manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit jobs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: Commit updated jobs.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jobs.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update jobs $(date -I)"
          git push
