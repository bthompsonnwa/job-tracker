name: Daily Job Scraper

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          sudo apt-get install -y libasound2t64 libgbm1 libnss3 libxss1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0
          playwright install chromium

      - name: Run scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: Commit updated jobs.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jobs.json
          git diff --cached --quiet || git commit -m "chore: update jobs $(date -I)"
          git push
